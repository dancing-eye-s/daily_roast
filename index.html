<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Daily Roast</title>
    <meta
      name="description"
      content="광고 카피가 담긴 커피 캡슐을 골라 매일 한 잔처럼 내려보는 모바일 아카이브"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&family=Noto+Sans+KR:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" data-state="select">
      <header class="app-header" aria-label="Daily Roast">
        <p class="brand">Daily Roast</p>
        <p class="counter" id="status-count"></p>
      </header>

      <section class="stage" aria-live="polite">
        <div class="stage-track">
          <section class="scene scene-drawer" aria-label="커피 캡슐 선택">
            <div class="scene-title">
              <p class="kicker">Pick a capsule</p>
              <h1>오늘의 카피</h1>
            </div>

            <div class="capsule-drawer">
              <div class="drawer-handle"></div>
              <div class="capsule-grid" id="capsule-grid"></div>
            </div>
          </section>

          <section class="scene scene-machine" aria-label="커피 추출">
            <div class="machine-set">
              <div class="machine">
                <div class="machine-top"></div>
                <div class="machine-slot">
                  <span class="loaded-capsule" id="loaded-capsule"></span>
                </div>
                <div class="machine-face"></div>
                <div class="machine-spout"></div>
                <div class="machine-stream"></div>
              </div>
              <div class="brew-cup">
                <span class="brew-fill"></span>
              </div>
              <p class="brew-caption" id="brew-caption">캡슐을 장착하는 중</p>
            </div>
          </section>

          <section class="scene scene-reveal" aria-label="오늘의 광고 카피">
            <div class="reveal-cup">
              <span class="reveal-coffee"></span>
              <span class="smoke smoke-one"></span>
              <span class="smoke smoke-two"></span>
              <span class="smoke smoke-three"></span>
            </div>

            <article class="copy-card">
              <p class="copy-text" id="copy-text">
                캡슐을 고르면 오늘의 카피가 연기처럼 떠오릅니다.
              </p>
              <p class="copy-meta" id="copy-meta"></p>
            </article>

            <div class="reveal-actions">
              <a
                class="reveal-action detail-link is-disabled"
                id="note-link"
                href="#"
                target="_blank"
                rel="noreferrer"
                aria-disabled="true"
              >
                자세히 보기
              </a>
              <button class="reveal-action again-button" id="again-button" type="button">
                카피 한 잔 더 내리기
              </button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./data/archive.js"></script>
    <script src="./data/copypedia.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
